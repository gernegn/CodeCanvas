<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz สมองซ้ายหรือขวา ใครคุมเกม?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">

    <!-- Clouds -->
    <div class="cloud cloud-1"><img src="img-elements/cloud_02.png" alt=""></div>
    <div class="cloud cloud-2"><img src="img-elements/cloud_03.png" alt=""></div>
    <div class="cloud cloud-3"><img src="img-elements/cloud_01.png" alt=""></div>
    <div class="cloud cloud-4"><img src="img-elements/cloud_04.png" alt=""></div>

    <!-- Wink Stars -->
    <div class="wink wink-1"><img src="img-elements/wink.png" alt=""></div>
    <div class="wink wink-2"><img src="img-elements/wink.png" alt=""></div>
    <div class="wink wink-3"><img src="img-elements/wink.png" alt=""></div>
    <div class="wink wink-4"><img src="img-elements/wink.png" alt=""></div>

    <!-- Brain Characters -->
    <div class="brain brain-left"><img src="img-elements/brain_left.png" alt="สมองซีกซ้าย"></div>
    <div class="brain brain-right"><img src="img-elements/brain_right.png" alt="สมองซีกขวา"></div>
    <div class="brain brain-both"><img src="img-elements/brain_both.png" alt="สมองทั้งสองซีก"></div>

    <!-- Center Content -->
    <div class="content">
      <div class="quiz-label">Quiz</div>
      <div class="quiz-sub">สมองซ้ายหรือขวา</div>
      <div class="quiz-sub">ใครคุมเกม?</div>
      <button class="btn-start" id="btnStart">เริ่มเล่นกันเลย! ✨</button>
    </div>

    <!-- Grass -->
    <div class="grass"></div>

    <!-- Clovers -->
    <div class="clover clover-left"><img src="img-elements/Clover.png" alt=""></div>
    <div class="clover clover-right"><img src="img-elements/Clover.png" alt=""></div>

    <!-- Logos -->
    <div class="logos">
      <img src="img-elements/logo_codecanvas.png" alt="CodeCanvas">
      <img src="img-elements/logo_func.png" alt="FUNC">
      <img src="img-elements/logo_ict.png" alt="ICT Silpakorn">
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
